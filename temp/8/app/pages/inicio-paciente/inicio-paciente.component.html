<!-- inicio-paciente.component.html -->

<div class="container">
  <h2>Actualizar Información Pacientes</h2>

  <!-- Formulario para consultar paciente por documento -->
  <div class="mb-3">
    <label for="idInput" class="form-label">ID del Paciente:</label>
    <input type="text" class="form-control" id="idInput" [(ngModel)]="idConsulta" placeholder="Ingrese el ID">
    <button class="btn btn-primary mt-2" (click)="consultarPaciente()">Consultar Paciente</button>
  </div>

  <!-- Mostrar y editar información del paciente consultado -->
 <!-- Mostrar y editar información del paciente consultado -->
<div *ngIf="paciente !== null" class="mb-3">
  <h3>Datos del Paciente</h3>
  <form>
    <div class="mb-3">
      <label for="pacNombresInput" class="form-label">Nombres:</label>
      <input type="text" class="form-control" id="pacNombresInput" [(ngModel)]="paciente.pacNombres" disabled>
    </div>

    <div class="mb-3">
      <label for="pacApellidosInput" class="form-label">Apellidos:</label>
      <input type="text" class="form-control" id="pacApellidosInput" [(ngModel)]="paciente.pacApellidos" disabled>
    </div>

    <div class="mb-3">
      <label for="pacFechaNacimientoInput" class="form-label">Fecha de Nacimiento:</label>
      <input type="text" class="form-control" id="pacFechaNacimientoInput" [(ngModel)]="paciente.pacFechaNacimiento" disabled>
    </div>

    <div class="mb-3">
      <label for="pacSexoInput" class="form-label">Sexo:</label>
      <input type="text" class="form-control" id="pacSexoInput" [(ngModel)]="paciente.pacSexo" disabled>
    </div>

    <div class="mb-3">
      <label for="pacTelefonoInput" class="form-label">Teléfono:</label>
      <input type="text" class="form-control" id="pacTelefonoInput" [(ngModel)]="paciente.pacTelefono" disabled>
    </div>

    <div class="mb-3">
      <label for="pacCorreoInput" class="form-label">Correo:</label>
      <input type="text" class="form-control" id="pacCorreoInput" [(ngModel)]="paciente.pacCorreo" disabled>
    </div>

    <div class="mb-3">
      <label for="pacEPSInput" class="form-label">EPS:</label>
      <input type="text" class="form-control" id="pacEPSInput" [(ngModel)]="paciente.pacEPS" disabled>
    </div>

    <div class="mb-3">
      <label for="pacEstadoInput" class="form-label">Estado:</label>
      <input type="text" class="form-control" id="pacEstadoInput" [(ngModel)]="paciente.pacEstado" disabled>
    </div>

    <div class="mb-3">
      <label for="pacContrasenaInput" class="form-label">Contraseña:</label>
      <input type="text" class="form-control" id="pacContrasenaInput" [(ngModel)]="paciente.pacContrasena" disabled>
    </div>

    <div class="mb-3">
      <label for="userrolesInput" class="form-label">Roles de Usuario:</label>
      <input type="text" class="form-control" id="userrolesInput" [(ngModel)]="paciente.userroles" disabled>
    </div>

    <button class="btn btn-primary" (click)="editarPaciente()">Guardar Cambios</button>
  </form>
</div>




  <!-- Lista de pacientes -->
  <ul class="list-group mt-3">
    <li *ngFor="let paciente of pacientes" class="list-group-item">
      <!-- Mostrar información del paciente -->
      {{ paciente.pacNombres }} {{ paciente.pacApellidos }}
      <!-- Botones para ver detalles, editar y eliminar -->
      <button class="btn btn-info btn-sm mx-2" (click)="verDetalles(paciente)">Ver Detalles</button>
      <button class="btn btn-warning btn-sm mx-2" (click)="editarPacienteFormulario(paciente)">Editar</button>
      <button class="btn btn-danger btn-sm" (click)="eliminarPaciente(paciente)">Eliminar</button>
    </li>
  </ul>
</div>
