<p *ngIf="!userLoginOn">Usuario No Autenticado</p>
<p *ngIf="userLoginOn">Usuario Autenticado</p>

<div *ngIf="userLoginOn"> <!-- Cambié <select> a <div> -->
    <div class="container mt-3">
        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                <div class="card">
                    <div class="card-body text-center">
                        <span class="titulo">LISTADO DE USUARIOS</span>
                        <button class="btn float-end nuevo" routerLink="/create-user">Nuevo</button>

                        <table *ngIf="listUsers.length > 0" class="table mt-4">
                            <thead>
                                <tr>
                                    <th scope="col">Nombre Completo</th>
                                    <th scope="col">Correo electronico</th>
                                    <th scope="col">Estado</th>
                                    <th scope="col">Rol</th>
                                    <th scope="col"></th>
                                </tr>
                            </thead>
                            <tbody class="table-group-divider">
                                <tr *ngFor="let user of listUsers">
                                    <td>{{user.username}}</td>
                                    <td>{{user.useremail}}</td>
                                    <td>{{user.userestado}}</td>
                                    <td>{{user.userroles}}</td>
                                    <td>
                                        <i [routerLink]="['/edit-user', user._id]" class="fa-solid fa-pen-to-square text-primary"></i>
                                        <i (click)="eliminarUser(user._id)" class="fa-solid fa-trash text-danger"></i>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <ng-template #loading>Cargando...</ng-template>
                        <h5 style="text-align: start; margin-top: 10px;" *ngIf="listUsers.length == 0">No hay usuarios para mostrar</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
